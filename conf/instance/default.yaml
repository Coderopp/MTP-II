# Instance-generation knobs (one row from the experiment grid).
N: 50                        # customers per instance
n_depots: 5                  # k-means cluster size for Blinkit depots
R_bar: 0.40                  # ε-constraint: per-route risk budget (from FORMULATION.md §6)
H_bar: 1000000               # fleet residential budget (∞-sentinel by default)
seed: 42
# Customers may only be sampled from nodes whose free-flow time to the
# nearest depot is ≤ delivery_radius_min minutes.  Models the q-commerce
# delivery zone (Blinkit advertises ~10-min delivery so the physical
# reach is small) and prevents T_max-infeasible instances from being
# generated.
delivery_radius_min: 10.0
