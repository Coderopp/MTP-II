name: milp

# Backend: "auto" uses HiGHS (free, fast) with CBC fallback.
# Set to "gurobi" only if you have a Gurobi license.
backend: auto
time_limit_s: 300
mip_gap: 0.01
threads: 8
log_to_console: false

# Piecewise-linear breakpoints for exp(β·τ) − 1 — FORMULATION.md §5.1.
stw_pwl_breakpoints: [0, 2, 5, 10, 15, 20, 30]
